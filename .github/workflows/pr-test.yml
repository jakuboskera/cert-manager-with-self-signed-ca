name: PR Test - Terraform Apply

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform-apply:
    name: Terraform Init & Apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Verify all pods are running
        run: kubectl wait --for=condition=Ready pods --all -A --timeout=300s

      - name: Test curl with CA certificate
        run: eval "$(terraform output -raw curl_command)"
